<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>指尖星河 · Galaxy at Your Fingertips</title>
<link href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #04050d; }
  body { font-family: 'Noto Serif SC', serif; color: rgba(255,255,255,0.85); }
  canvas { position: absolute; inset: 0; display: block; }
  #galaxy { cursor: crosshair; touch-action: none; }

  .ui { position: absolute; z-index: 10; user-select: none; -webkit-user-select: none; }

  #title {
    top: 28px; left: 32px; pointer-events: none;
    animation: fadeDown 1.6s cubic-bezier(.2,.7,.3,1) both;
  }
  #title h1 {
    font-size: 30px; font-weight: 900; letter-spacing: 10px;
    background: linear-gradient(120deg, #fff7e6, #9ecbff 55%, #b48cff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 40px rgba(120,140,255,0.25);
  }
  #title p {
    margin-top: 8px; font-size: 11px; letter-spacing: 5px;
    color: rgba(255,255,255,0.38); font-family: Georgia, serif;
  }

  #hint {
    left: 50%; bottom: 108px; transform: translateX(-50%);
    font-size: 13px; letter-spacing: 3px; text-align: center; line-height: 2.1;
    color: rgba(255,255,255,0.5); pointer-events: none; white-space: nowrap;
    animation: fadeDown 1.6s .6s cubic-bezier(.2,.7,.3,1) both;
    transition: opacity 1.2s;
  }
  #hint em { font-style: normal; color: rgba(180,200,255,0.9); }
  #hint.gone { opacity: 0; }

  #modes {
    left: 50%; bottom: 36px; transform: translateX(-50%);
    display: flex; gap: 10px; padding: 8px;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    animation: fadeUp 1.6s .3s cubic-bezier(.2,.7,.3,1) both;
  }
  .pill {
    padding: 9px 22px; border-radius: 100px; font-size: 13px; letter-spacing: 4px;
    color: rgba(255,255,255,0.55); cursor: pointer; border: 1px solid transparent;
    transition: all .35s; font-family: inherit; background: none;
  }
  .pill:hover { color: rgba(255,255,255,0.9); }
  .pill.on {
    color: #eaf1ff; background: rgba(130,150,255,0.16);
    border-color: rgba(150,170,255,0.35);
    box-shadow: 0 0 24px rgba(120,140,255,0.25), inset 0 0 12px rgba(140,160,255,0.12);
  }

  #sound {
    top: 30px; right: 32px; width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .35s; animation: fadeDown 1.6s .4s both;
  }
  #sound:hover { border-color: rgba(255,255,255,0.3); }
  #sound.on { box-shadow: 0 0 24px rgba(120,140,255,0.35); border-color: rgba(150,170,255,0.5); }
  #sound svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.75); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  #sound .waves { opacity: 0; transition: opacity .3s; }
  #sound.on .waves { opacity: 1; }

  #stats {
    left: 32px; bottom: 34px; font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.28); font-family: Georgia, monospace; pointer-events: none;
    animation: fadeUp 1.6s .5s both;
  }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 14px); } to { opacity: 1; transform: translate(-50%, 0); } }
  #stats { animation-name: fadeUpL; } @keyframes fadeUpL { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    #title { top: 20px; left: 20px; }
    #title h1 { font-size: 22px; letter-spacing: 7px; }
    #hint { font-size: 11px; bottom: 96px; letter-spacing: 2px; }
    .pill { padding: 8px 16px; font-size: 12px; letter-spacing: 3px; }
    #sound { top: 20px; right: 20px; }
    #stats { display: none; }
  }
</style>
</head>
<body>

<canvas id="space"></canvas>
<canvas id="galaxy"></canvas>

<div class="ui" id="title">
  <h1>指尖星河</h1>
  <p>GALAXY AT YOUR FINGERTIPS</p>
</div>

<div class="ui" id="hint">
  移动 · 扰动星尘 <em>／</em> 长按 · 引力坍缩 <em>／</em> 松手 · 超新星爆发
</div>

<div class="ui" id="modes">
  <button class="pill on" data-mode="attract">引力</button>
  <button class="pill" data-mode="repel">斥力</button>
  <button class="pill" data-mode="vortex">漩涡</button>
</div>

<div class="ui" id="sound" title="声音">
  <svg viewBox="0 0 24 24">
    <path d="M11 5 6 9 H3 v6 h3 l5 4 z"/>
    <path class="waves" d="M15.5 8.5 a5 5 0 0 1 0 7 M18 6 a8.5 8.5 0 0 1 0 12"/>
  </svg>
</div>

<div class="ui" id="stats"></div>

<script>
(() => {
  'use strict';

  // ---------- 画布 ----------
  const bg = document.getElementById('space');
  const cv = document.getElementById('galaxy');
  const bctx = bg.getContext('2d');
  const ctx = cv.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0, CX = 0, CY = 0, MAXR = 0;
  const TILT = -0.42, TILT_C = Math.cos(TILT), TILT_S = Math.sin(TILT); // 星系盘整体倾斜

  const isMobile = matchMedia('(pointer: coarse)').matches;
  const COUNT = isMobile ? 1050 : 2100;

  // ---------- 星尘精灵（预渲染发光贴图，比逐个 arc 快一个量级） ----------
  const PALETTE = [
    '#fff3d6', '#ffd9a0',            // 核心：暖金
    '#dceaff', '#9ecbff', '#6ea8ff', // 中环：冰蓝
    '#b48cff', '#8f7bff', '#ff9ecb'  // 外环：紫与粉
  ];
  const sprites = PALETTE.map(color => {
    const s = document.createElement('canvas');
    s.width = s.height = 64;
    const g = s.getContext('2d');
    const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.25, color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = grad;
    g.fillRect(0, 0, 64, 64);
    return s;
  });

  // ---------- 星系粒子 ----------
  const P = [];  // 主星系
  const rand = (a, b) => a + Math.random() * (b - a);
  const gauss = () => (Math.random() + Math.random() + Math.random()) / 1.5 - 1;

  function buildGalaxy() {
    P.length = 0;
    const ARMS = 3, TWIST = 0.0085;
    for (let i = 0; i < COUNT; i++) {
      const halo = Math.random() < 0.22;               // 22% 弥散晕星
      const r = 26 + Math.pow(Math.random(), 0.72) * (MAXR - 26);
      const t = r / MAXR;
      let theta;
      if (halo) {
        theta = Math.random() * Math.PI * 2;
      } else {
        const arm = (Math.random() * ARMS | 0) * (Math.PI * 2 / ARMS);
        theta = arm + r * TWIST + gauss() * (0.55 - t * 0.25);
      }
      // 颜色按半径分层：核心暖金 → 中环冰蓝 → 外环紫粉
      let ci;
      if (t < 0.22)      ci = Math.random() < 0.6 ? 0 : 1;
      else if (t < 0.62) ci = 2 + (Math.random() * 3 | 0);
      else               ci = 5 + (Math.random() * 3 | 0);
      P.push({
        r, theta,
        squash: rand(0.52, 0.82),                    // 每颗星各自的椭率，轮廓不再规整
        wob: rand(0.04, 0.13),                       // 轨道半径起伏，边缘呈不规则波瓣
        wobK: 2 + (Math.random() * 2 | 0),
        wobP: rand(0, Math.PI * 2),
        omega: 2.1 / Math.sqrt(r + 40) * (0.85 + Math.random() * 0.3),
        zh: gauss() * (halo ? 26 : 6 + 16 * (1 - t)),  // 盘厚度：核心鼓包厚、外盘薄、晕星最散
        x: 0, y: 0, vx: 0, vy: 0, placed: false,
        size: (t < 0.22 ? 1.5 : 1.0) * rand(1.0, 3.0),
        alpha: rand(0.22, 0.8),
        sprite: sprites[ci]
      });
    }
  }

  // ---------- 临时粒子：爆发火花 / 冲击波 / 流星 ----------
  const sparks = [], rings = [], meteors = [];

  // ---------- 逃逸星尘：少量粒子从星系缓缓飘向屏幕四周 ----------
  const dust = [];
  const DUST_N = isMobile ? 26 : 50;
  function resetDust(d) {
    const a = Math.random() * Math.PI * 2;
    const r = rand(40, MAXR * 0.75);
    d.x = CX + Math.cos(a) * r;
    d.y = CY + Math.sin(a) * r * 0.6;
    const out = Math.atan2(d.y - CY, d.x - CX) + rand(-0.5, 0.5);
    const v = rand(0.15, 0.45);
    d.vx = Math.cos(out) * v;
    d.vy = Math.sin(out) * v;
    d.life = 0;
    d.size = rand(0.7, 1.8);
    d.sprite = sprites[Math.random() * sprites.length | 0];
  }
  function buildDust() {
    dust.length = 0;
    for (let i = 0; i < DUST_N; i++) {
      const d = {};
      resetDust(d);
      d.life = Math.random();          // 初始相位错开，避免同时淡入
      dust.push(d);
    }
  }

  function burst(x, y, power) {
    const n = Math.min(90, 30 + power * 60 | 0);
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = rand(0.6, 4.5) * (0.6 + power);
      sparks.push({
        x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
        life: 1, decay: rand(0.004, 0.014),
        size: rand(0.8, 2.6),
        sprite: sprites[Math.random() * sprites.length | 0]
      });
    }
    rings.push({ x, y, r: 6, vr: 4.5 + power * 6, alpha: 0.9 });
    // 冲击波推开星系粒子
    const R2 = 260 + power * 300;
    for (const p of P) {
      const dx = p.x - x, dy = p.y - y;
      const d = Math.hypot(dx, dy);
      if (d < R2 && d > 0.5) {
        const f = (1 - d / R2) * (3 + power * 13);
        p.vx += dx / d * f; p.vy += dy / d * f;
      }
    }
  }

  function spawnMeteor() {
    const fromLeft = Math.random() < 0.5;
    meteors.push({
      x: fromLeft ? -60 : rand(0, W), y: fromLeft ? rand(0, H * 0.5) : -60,
      vx: rand(5, 9), vy: rand(2.5, 5),
      life: 1, len: rand(70, 150)
    });
  }

  // ---------- 静态背景：深空渐变 + 星云 + 远景星 ----------
  function paintBackground() {
    bctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    const g = bctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.75);
    g.addColorStop(0, '#0b0e22');
    g.addColorStop(0.5, '#070818');
    g.addColorStop(1, '#03040a');
    bctx.fillStyle = g;
    bctx.fillRect(0, 0, W, H);

    // 两团淡淡的星云
    const nebulae = [
      [CX - W * 0.28, CY - H * 0.22, W * 0.4, 'rgba(110,90,220,0.10)'],
      [CX + W * 0.3, CY + H * 0.24, W * 0.35, 'rgba(60,120,220,0.08)'],
      [CX, CY, W * 0.22, 'rgba(255,200,140,0.05)']
    ];
    for (const [x, y, r, c] of nebulae) {
      const n = bctx.createRadialGradient(x, y, 0, x, y, r);
      n.addColorStop(0, c);
      n.addColorStop(1, 'rgba(0,0,0,0)');
      bctx.fillStyle = n;
      bctx.fillRect(0, 0, W, H);
    }

    // 远景静态小星
    for (let i = 0; i < 260; i++) {
      const a = Math.random() * 0.5 + 0.06;
      bctx.fillStyle = `rgba(255,255,255,${a})`;
      const s = Math.random() < 0.92 ? 1 : 1.6;
      bctx.fillRect(Math.random() * W, Math.random() * H, s, s);
    }
  }

  // ---------- 布局 ----------
  function resize() {
    W = innerWidth; H = innerHeight;
    CX = W / 2; CY = H / 2;
    MAXR = Math.min(W, H) * 0.58;
    for (const c of [bg, cv]) {
      c.width = W * DPR; c.height = H * DPR;
      c.style.width = W + 'px'; c.style.height = H + 'px';
    }
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    paintBackground();
    buildGalaxy();
    buildDust();
  }
  addEventListener('resize', resize);

  // ---------- 输入 ----------
  const mouse = { x: -9999, y: -9999, down: false, downAt: 0, active: false };
  let mode = 'attract';
  const hint = document.getElementById('hint');
  let interacted = false;

  cv.addEventListener('pointermove', e => {
    mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
  });
  cv.addEventListener('pointerdown', e => {
    mouse.x = e.clientX; mouse.y = e.clientY;
    mouse.down = true; mouse.downAt = performance.now(); mouse.active = true;
    if (!interacted) { interacted = true; setTimeout(() => hint.classList.add('gone'), 2500); }
    audio.resume();
    cv.setPointerCapture(e.pointerId);
  });
  function release(e) {
    if (!mouse.down) return;
    mouse.down = false;
    const held = (performance.now() - mouse.downAt) / 1000;
    const power = Math.min(held / 1.6, 1);           // 按住越久，爆发越猛
    burst(mouse.x, mouse.y, power);
    audio.boom(power);
  }
  cv.addEventListener('pointerup', release);
  cv.addEventListener('pointercancel', release);
  cv.addEventListener('pointerleave', () => { if (!mouse.down) { mouse.active = false; mouse.x = -9999; } });

  document.querySelectorAll('.pill').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelector('.pill.on').classList.remove('on');
      b.classList.add('on');
      mode = b.dataset.mode;
      audio.pluck(0.5);
    });
  });

  // ---------- 声音（Web Audio 实时合成，零外部资源） ----------
  const audio = (() => {
    let ac = null, master = null, padGain = null, enabled = false;
    const PENTA = [261.63, 293.66, 329.63, 392.0, 440.0, 523.25];

    function init() {
      if (ac) return;
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain();
      master.gain.value = 0;
      master.connect(ac.destination);

      // 氛围垫底音：三个正弦轻声铺底，慢 LFO 呼吸
      padGain = ac.createGain();
      padGain.gain.value = 0.05;
      const filter = ac.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 900;
      padGain.connect(filter); filter.connect(master);
      [65.41, 98.0, 164.81].forEach((f, i) => {
        const o = ac.createOscillator();
        o.type = 'sine'; o.frequency.value = f; o.detune.value = i * 4 - 4;
        o.connect(padGain); o.start();
      });
      const lfo = ac.createOscillator(), lg = ac.createGain();
      lfo.frequency.value = 0.08; lg.gain.value = 0.02;
      lfo.connect(lg); lg.connect(padGain.gain); lfo.start();
    }

    return {
      toggle() {
        enabled = !enabled;
        if (enabled) { init(); ac.resume(); }
        if (ac) master.gain.linearRampToValueAtTime(enabled ? 0.9 : 0, ac.currentTime + 0.8);
        return enabled;
      },
      resume() { if (enabled && ac) ac.resume(); },
      pluck(pos) {  // 五声音阶拨弦，音高随横向位置
        if (!enabled || !ac) return;
        const f = PENTA[Math.min(PENTA.length - 1, pos * PENTA.length | 0)];
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'triangle'; o.frequency.value = f * 2;
        g.gain.setValueAtTime(0.12, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 1.2);
        o.connect(g); g.connect(master);
        o.start(); o.stop(ac.currentTime + 1.3);
      },
      boom(power) {  // 超新星：噪声 + 低通扫频
        if (!enabled || !ac) return;
        const dur = 1.2 + power * 1.2;
        const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
        const src = ac.createBufferSource(); src.buffer = buf;
        const f = ac.createBiquadFilter(); f.type = 'lowpass';
        f.frequency.setValueAtTime(2400 + power * 2000, ac.currentTime);
        f.frequency.exponentialRampToValueAtTime(60, ac.currentTime + dur);
        const g = ac.createGain(); g.gain.value = 0.25 + power * 0.5;
        src.connect(f); f.connect(g); g.connect(master);
        src.start();
        this.pluck(Math.random());
      }
    };
  })();

  const soundBtn = document.getElementById('sound');
  soundBtn.addEventListener('click', () => soundBtn.classList.toggle('on', audio.toggle()));

  // ---------- 主循环 ----------
  const stats = document.getElementById('stats');
  let last = performance.now(), fpsAcc = 0, fpsN = 0, fpsShown = 60;
  let meteorTimer = 3;

  function frame(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;

    // 尾迹淡出：擦除上一帧的 alpha，让背景画布透出来
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter';

    // 黑洞蓄力
    const holding = mouse.down;
    const holdT = holding ? Math.min((now - mouse.downAt) / 1600, 1) : 0;

    const INF = isMobile ? 130 : 170;         // 指针影响半径
    const inf2 = INF * INF;

    // --- 星系粒子 ---
    for (let i = 0; i < P.length; i++) {
      const p = P[i];
      p.theta += p.omega * dt;
      const rw = p.r * (1 + p.wob * Math.sin(p.theta * p.wobK + p.wobP));
      const ex = Math.cos(p.theta) * rw;
      const ey = Math.sin(p.theta) * rw * p.squash;
      const hx = CX + ex * TILT_C - ey * TILT_S;
      const hy = CY + ex * TILT_S + ey * TILT_C + p.zh;
      if (!p.placed) { p.x = hx; p.y = hy; p.placed = true; }

      // 弹簧回位（让星系被扰动后自我修复）
      p.vx += (hx - p.x) * 0.008;
      p.vy += (hy - p.y) * 0.008;

      // 指针力场
      if (mouse.active) {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const d2 = dx * dx + dy * dy;
        const R = holding ? INF * (1.6 + holdT * 1.2) : INF;
        if (d2 < R * R && d2 > 1) {
          const d = Math.sqrt(d2);
          const t = 1 - d / R;
          if (holding) {
            // 黑洞：强吸积 + 切向旋转
            const f = t * (0.8 + holdT * 2.0);
            p.vx += (-dx / d) * f + (-dy / d) * f * 0.7;
            p.vy += (-dy / d) * f + (dx / d) * f * 0.7;
          } else if (mode === 'attract') {
            const f = t * 0.3;
            p.vx -= dx / d * f; p.vy -= dy / d * f;
          } else if (mode === 'repel') {
            const f = t * t * 0.6;
            p.vx += dx / d * f; p.vy += dy / d * f;
          } else { // vortex
            const f = t * 0.45;
            p.vx += (-dy / d) * f - dx / d * f * 0.12;
            p.vy += (dx / d) * f - dy / d * f * 0.12;
          }
        }
      }

      p.vx *= 0.93; p.vy *= 0.93;
      p.x += p.vx; p.y += p.vy;

      // 深度感：转到盘的近侧（sin 为正）时更大更亮，远侧更小更暗
      const near = (Math.sin(p.theta) + 1) / 2;
      const sz = p.size * 6 * (0.75 + near * 0.55);
      ctx.globalAlpha = p.alpha * (0.6 + near * 0.4);
      ctx.drawImage(p.sprite, p.x - sz / 2, p.y - sz / 2, sz, sz);
    }

    // --- 逃逸星尘 ---
    for (const d of dust) {
      d.x += d.vx; d.y += d.vy;
      d.vx *= 1.003; d.vy *= 1.003;               // 越飞越快，缓慢逃逸
      d.life += dt * 0.25;
      if (d.x < -50 || d.x > W + 50 || d.y < -50 || d.y > H + 50) { resetDust(d); continue; }
      const t = Math.min(d.life, 1);
      const sz = d.size * 6 * (1 + t * 0.8);      // 飞得越远越大，像迎面而来
      ctx.globalAlpha = t * (1 - t * 0.45) * 0.6; // 淡入后缓慢转淡
      ctx.drawImage(d.sprite, d.x - sz / 2, d.y - sz / 2, sz, sz);
    }

    // --- 火花 ---
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.975; s.vy *= 0.975;
      s.life -= s.decay;
      if (s.life <= 0) { sparks.splice(i, 1); continue; }
      const sz = s.size * 7 * s.life;
      ctx.globalAlpha = s.life;
      ctx.drawImage(s.sprite, s.x - sz / 2, s.y - sz / 2, sz, sz);
    }

    // --- 冲击波圆环 ---
    ctx.globalAlpha = 1;
    for (let i = rings.length - 1; i >= 0; i--) {
      const r = rings[i];
      r.r += r.vr; r.vr *= 0.965; r.alpha *= 0.94;
      if (r.alpha < 0.02) { rings.splice(i, 1); continue; }
      ctx.strokeStyle = `rgba(190,210,255,${r.alpha})`;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.stroke();
    }

    // --- 流星 ---
    meteorTimer -= dt;
    if (meteorTimer <= 0) { spawnMeteor(); meteorTimer = rand(2.5, 7); }
    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      m.x += m.vx; m.y += m.vy;
      if (m.x > W + 100 || m.y > H + 100) { meteors.splice(i, 1); continue; }
      const nx = m.vx / Math.hypot(m.vx, m.vy), ny = m.vy / Math.hypot(m.vx, m.vy);
      const grad = ctx.createLinearGradient(m.x, m.y, m.x - nx * m.len, m.y - ny * m.len);
      grad.addColorStop(0, 'rgba(255,255,255,0.9)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - nx * m.len, m.y - ny * m.len);
      ctx.stroke();
    }

    // --- 指针光晕 / 黑洞视界 ---
    if (mouse.active && mouse.x > -100) {
      if (holding) {
        const R = 14 + holdT * 26;
        const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, R * 3);
        g.addColorStop(0, `rgba(160,140,255,${0.5 + holdT * 0.4})`);
        g.addColorStop(0.4, `rgba(110,120,255,${0.22 + holdT * 0.2})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(mouse.x - R * 3, mouse.y - R * 3, R * 6, R * 6);
        ctx.strokeStyle = `rgba(200,190,255,${0.5 + holdT * 0.5})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, R + Math.sin(now / 90) * 2.5, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 34);
        g.addColorStop(0, 'rgba(190,205,255,0.28)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(mouse.x - 34, mouse.y - 34, 68, 68);
      }
    }

    // --- 星系核心辉光 ---
    const coreG = ctx.createRadialGradient(CX, CY, 0, CX, CY, 130);
    coreG.addColorStop(0, 'rgba(255,235,190,0.11)');
    coreG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = coreG;
    ctx.fillRect(CX - 130, CY - 130, 260, 260);

    // --- FPS 统计 ---
    fpsAcc += dt; fpsN++;
    if (fpsAcc >= 0.5) {
      fpsShown = Math.round(fpsN / fpsAcc);
      fpsAcc = 0; fpsN = 0;
      stats.textContent = `${COUNT} STARDUST · ${fpsShown} FPS`;
    }

    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
