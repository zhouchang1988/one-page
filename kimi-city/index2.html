<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>御剑飞行 · 仙侠世界</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e1a22; }
  body { font-family: "Kaiti SC", "STKaiti", "KaiTi", "Noto Serif SC", "Songti SC", serif; }
  #scene { position: fixed; inset: 0; display: block; touch-action: none; }
  #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(10, 20, 26, .38) 100%); }
  .panel { position: fixed; z-index: 5; pointer-events: none; color: #f3e9c8; text-shadow: 0 1px 6px rgba(0,0,0,.55); }
  #titleBox { top: 26px; left: 30px; }
  #titleBox h1 { font-size: 44px; letter-spacing: 14px; font-weight: 600; color: #fdf6dd; }
  #titleBox .sub { margin-top: 6px; font-size: 14px; letter-spacing: 6px; color: #e6d3a3; opacity: .9; }
  #seal { margin-top: 12px; width: 34px; padding: 6px 0; background: #b03a2e; color: #fff7e8;
    font-size: 16px; line-height: 1.25; text-align: center; border-radius: 5px; letter-spacing: 2px;
    writing-mode: vertical-rl; box-shadow: 0 2px 10px rgba(0,0,0,.4); transform: rotate(-3deg); }
  #stats { top: 26px; right: 30px; text-align: right; font-size: 15px; letter-spacing: 2px; line-height: 1.9; }
  #stats b { color: #ffe9a8; font-weight: 600; }
  #btns { position: fixed; z-index: 6; top: 128px; right: 30px; display: flex; flex-direction: column; gap: 10px; }
  #btns button { pointer-events: auto; cursor: pointer; font-family: inherit; font-size: 15px; letter-spacing: 3px;
    padding: 9px 18px; color: #f3e6bd; background: rgba(20, 32, 40, .55); border: 1px solid rgba(230, 200, 130, .55);
    border-radius: 8px; backdrop-filter: blur(6px); transition: .2s; }
  #btns button:hover { background: rgba(120, 90, 40, .55); border-color: #ffd98a; color: #fff3d0; }
  #hint { left: 50%; bottom: 26px; transform: translateX(-50%); font-size: 14px; letter-spacing: 2px;
    background: rgba(14, 24, 30, .5); border: 1px solid rgba(230, 200, 130, .35); border-radius: 999px;
    padding: 9px 22px; white-space: nowrap; backdrop-filter: blur(6px); }
  @media (max-width: 720px) {
    #titleBox h1 { font-size: 30px; letter-spacing: 8px; }
    #hint { font-size: 11px; padding: 8px 14px; max-width: 92vw; white-space: normal; text-align: center; }
    #stats { font-size: 13px; }
  }
  #loading, #error { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; background: linear-gradient(160deg, #16232c, #0b141b);
    color: #e8d9a8; letter-spacing: 6px; transition: opacity .8s; }
  #loading.hide { opacity: 0; pointer-events: none; }
  #loading h1 { font-size: 40px; letter-spacing: 16px; color: #f6ead0; font-weight: 600; }
  .ring { width: 42px; height: 42px; border-radius: 50%; border: 2px solid rgba(230, 200, 130, .25);
    border-top-color: #e8c878; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error[hidden] { display: none; }
  #error p { letter-spacing: 2px; line-height: 2; text-align: center; color: #cbb98d; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="vignette"></div>

<div id="titleBox" class="panel">
  <h1>御剑飞行</h1>
  <div class="sub">云游仙侠 · 三维画卷</div>
  <div id="seal">御剑</div>
</div>

<div id="stats" class="panel">
  <div>模式 · <b id="statMode">自动巡航</b></div>
  <div>剑速 · <b id="statSpeed">0</b></div>
  <div>高度 · <b id="statAlt">0</b></div>
</div>

<div id="btns">
  <button id="btnMode">切换手动</button>
  <button id="btnReset">回到起点</button>
</div>

<div id="hint" class="panel">W/S 俯仰 · A/D 转向 · Space 御风加速 · 滚轮调速 · C 巡航 · R 复位</div>

<div id="loading">
  <h1>御剑飞行</h1>
  <div class="ring"></div>
  <div style="font-size:14px; letter-spacing:4px;">画卷展开中…</div>
</div>

<div id="error" hidden>
  <h1 style="font-size:28px; letter-spacing:8px;">画卷未能展开</h1>
  <p>页面需从 CDN 加载 Three.js，请检查网络连接后刷新重试。</p>
</div>

<script type="module">
let THREE;
try {
  THREE = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js');
} catch (e) {
  document.getElementById('loading').classList.add('hide');
  document.getElementById('error').hidden = false;
  throw e;
}

/* ---------------- 基础工具 ---------------- */
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const wrapAngle = a => { while (a > Math.PI) a -= Math.PI * 2; while (a < -Math.PI) a += Math.PI * 2; return a; };

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.08;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xdfe8de, 260, 2500);

const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.5, 9000);
camera.position.set(60, 240, 640);

/* ---------------- 光照与天空 ---------------- */
scene.add(new THREE.HemisphereLight(0xcfe0ea, 0x51705f, 0.85));
scene.add(new THREE.AmbientLight(0x9db8b0, 0.25));
const sunLight = new THREE.DirectionalLight(0xffe6bd, 1.7);
sunLight.position.set(-1400, 1000, -1800);
scene.add(sunLight);

const sky = new THREE.Mesh(
  new THREE.SphereGeometry(4200, 24, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite: false, fog: false,
    uniforms: {
      cTop: { value: new THREE.Color(0x6ea7cd) },
      cHor: { value: new THREE.Color(0xf2dfb2) },
      cBot: { value: new THREE.Color(0xcfdccf) },
    },
    vertexShader: `varying vec3 vP; void main(){ vP = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `varying vec3 vP; uniform vec3 cTop, cHor, cBot;
      void main(){ float h = normalize(vP).y;
        vec3 c = h > 0.0 ? mix(cHor, cTop, pow(smoothstep(0.0, 0.55, h), 0.75)) : mix(cHor, cBot, smoothstep(0.0, -0.25, h));
        gl_FragColor = vec4(c, 1.0); }`
  })
);
scene.add(sky);

/* ---------------- 程序化贴图 ---------------- */
function makeCanvas(s, draw) {
  const c = document.createElement('canvas'); c.width = c.height = s;
  draw(c.getContext('2d'), s);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const glowTex = makeCanvas(128, (x, s) => {
  const g = x.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(0.35, 'rgba(255,255,255,.55)'); g.addColorStop(1, 'rgba(255,255,255,0)');
  x.fillStyle = g; x.fillRect(0, 0, s, s);
});
const cloudTex = makeCanvas(256, (x, s) => {
  for (let i = 0; i < 26; i++) {
    const px = rand(s*0.2, s*0.8), py = rand(s*0.35, s*0.65), r = rand(s*0.08, s*0.22);
    const g = x.createRadialGradient(px, py, 0, px, py, r);
    g.addColorStop(0, 'rgba(255,255,255,.55)'); g.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g; x.beginPath(); x.arc(px, py, r, 0, 7); x.fill();
  }
});
const seaTex = makeCanvas(512, (x, s) => {
  for (let i = 0; i < 90; i++) {
    const px = rand(0, s), py = rand(0, s), r = rand(20, 70);
    const g = x.createRadialGradient(px, py, 0, px, py, r);
    g.addColorStop(0, 'rgba(255,255,255,.5)'); g.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g; x.beginPath(); x.arc(px, py, r, 0, 7); x.fill();
  }
});
seaTex.wrapS = seaTex.wrapT = THREE.RepeatWrapping;
const seaTex2 = seaTex.clone(); seaTex2.needsUpdate = true;
const petalTex = makeCanvas(32, (x, s) => {
  x.translate(s/2, s/2); x.rotate(0.7);
  const g = x.createRadialGradient(0, 0, 0, 0, 0, 12);
  g.addColorStop(0, 'rgba(255,215,228,1)'); g.addColorStop(0.7, 'rgba(244,143,177,.9)'); g.addColorStop(1, 'rgba(244,143,177,0)');
  x.fillStyle = g; x.beginPath(); x.ellipse(0, 0, 11, 6, 0, 0, 7); x.fill();
});

// 朝阳
{
  const m1 = new THREE.SpriteMaterial({ map: glowTex, color: 0xffdf9e, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, fog: false });
  const s1 = new THREE.Sprite(m1); s1.scale.set(1500, 1500, 1); s1.position.set(-2100, 1050, -2900); scene.add(s1);
  const m2 = m1.clone(); m2.color = new THREE.Color(0xfff6dd);
  const s2 = new THREE.Sprite(m2); s2.scale.set(480, 480, 1); s2.position.copy(s1.position); scene.add(s2);
}

/* ---------------- 山峦 ---------------- */
function noise2(x, z, s) { return Math.sin(x*0.013+s) * Math.cos(z*0.011+s*1.7) + Math.sin((x+z)*0.006+s*2.3) * 0.6; }
function displace(geo, amp, seed, keepTop) {
  const p = geo.attributes.position, h = geo.parameters.height || 1;
  for (let i = 0; i < p.count; i++) {
    const x = p.getX(i), y = p.getY(i), z = p.getZ(i);
    const yn = clamp((y + h/2) / h, 0, 1);
    const a = amp * Math.pow(1 - yn, keepTop ? 1.6 : 1.0);
    p.setXYZ(i, x + noise2(x, z, seed) * a, y, z + noise2(z, x, seed + 9) * a);
  }
  geo.computeVertexNormals();
}
function paintByHeight(geo, cBase, cTop) {
  const p = geo.attributes.position, h = geo.parameters.height || 1, n = p.count;
  const colors = new Float32Array(n * 3);
  const cb = new THREE.Color(cBase), ct = new THREE.Color(cTop), c = new THREE.Color();
  for (let i = 0; i < n; i++) {
    const t = clamp((p.getY(i) + h/2) / h, 0, 1);
    c.copy(cb).lerp(ct, t * t * 0.9 + t * 0.1);
    const j = 1 + (Math.random() - 0.5) * 0.07;
    colors[i*3] = c.r * j; colors[i*3+1] = c.g * j; colors[i*3+2] = c.b * j;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
}
const mtnMat = new THREE.MeshStandardMaterial({ vertexColors: true, flatShading: true, roughness: 0.95, metalness: 0 });
function makePeak(x, z, h, r, seed, cBase = 0x3f6b5c, cTop = 0xc2d4c1, yBase = -60) {
  const geo = new THREE.ConeGeometry(r, h, 7, 6);
  displace(geo, r * 0.22, seed);
  paintByHeight(geo, cBase, cTop);
  const m = new THREE.Mesh(geo, mtnMat);
  m.position.set(x, h / 2 + yBase, z);
  scene.add(m);
  return m;
}

// 主仙峰（平顶，上有宝塔）
{
  const g = new THREE.CylinderGeometry(48, 340, 640, 9, 6);
  displace(g, 55, 3.7, true);
  paintByHeight(g, 0x3f6b5c, 0xc9dac9);
  const m = new THREE.Mesh(g, mtnMat);
  m.position.set(0, 640 / 2 - 50, -620);
  scene.add(m);
}
// 环群山峰
for (let i = 0; i < 64; i++) {
  const a = Math.random() * Math.PI * 2, d = rand(980, 2400);
  const h = rand(180, 640), r = h * rand(0.5, 0.75);
  makePeak(Math.cos(a) * d, Math.sin(a) * d, h, r, i * 1.37);
}
// 云海中探头的丘陵
for (let i = 0; i < 12; i++) {
  const a = Math.random() * Math.PI * 2, d = rand(160, 640);
  const h = rand(40, 95), r = h * rand(0.9, 1.4);
  makePeak(Math.cos(a) * d, Math.sin(a) * d, h, r, 40 + i, 0x527a58, 0xa4bd93, -20);
}
// 谷地
{
  const ground = new THREE.Mesh(new THREE.CircleGeometry(4200, 48), new THREE.MeshStandardMaterial({ color: 0x9fb5a8, roughness: 1 }));
  ground.rotation.x = -Math.PI / 2; ground.position.y = -52; scene.add(ground);
}

/* ---------------- 宝塔与松树 ---------------- */
const goldMat = new THREE.MeshStandardMaterial({ color: 0xd9a84e, flatShading: true, roughness: 0.4, metalness: 0.6, emissive: 0x442200, emissiveIntensity: 0.3 });
function makePagoda(levels, baseR) {
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x9c5540, flatShading: true, roughness: 0.8 });
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x2f4a4e, flatShading: true, roughness: 0.7 });
  let y = 0, r = baseR;
  for (let l = 0; l < levels; l++) {
    const bh = r * 0.95;
    const body = new THREE.Mesh(new THREE.CylinderGeometry(r * 0.62, r * 0.7, bh, 8), bodyMat);
    body.position.y = y + bh / 2; g.add(body);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(r * 1.18, r * 0.5, 8), roofMat);
    roof.position.y = y + bh + r * 0.2; g.add(roof);
    y += bh + r * 0.28; r *= 0.86;
  }
  const spire = new THREE.Mesh(new THREE.CylinderGeometry(baseR * 0.04, baseR * 0.04, baseR * 0.8, 6), goldMat);
  spire.position.y = y + baseR * 0.3; g.add(spire);
  const orb = new THREE.Mesh(new THREE.SphereGeometry(baseR * 0.09, 8, 6), goldMat);
  orb.position.y = y + baseR * 0.72; g.add(orb);
  return g;
}
function makePine(h = 14) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(h*0.03, h*0.06, h*0.35, 5), new THREE.MeshStandardMaterial({ color: 0x5a4632, flatShading: true }));
  trunk.position.y = h * 0.18; g.add(trunk);
  const lm = new THREE.MeshStandardMaterial({ color: 0x3d6b4f, flatShading: true, roughness: 1 });
  for (let i = 0; i < 3; i++) {
    const cone = new THREE.Mesh(new THREE.ConeGeometry(h * (0.34 - i * 0.07), h * 0.34, 6), lm);
    cone.position.y = h * (0.35 + i * 0.22); g.add(cone);
  }
  return g;
}
{ // 主峰顶的宝塔与松林
  const p = makePagoda(7, 15); p.position.set(0, 590, -620); scene.add(p);
  for (const [tx, tz, s] of [[26, -600, 1.2], [-30, -636, 1], [12, -656, 0.85], [-14, -592, 0.7]]) {
    const t = makePine(16 * s); t.position.set(tx, 590, tz); scene.add(t);
  }
}

/* ---------------- 浮空仙岛 ---------------- */
const islands = [];
function makeIsland(x, y, z, r, withPagoda) {
  const g = new THREE.Group();
  const grass = new THREE.Mesh(new THREE.CylinderGeometry(r, r * 0.92, r * 0.28, 8), new THREE.MeshStandardMaterial({ color: 0x5f8f5c, flatShading: true, roughness: 1 }));
  grass.position.y = -r * 0.14; g.add(grass);
  const rockGeo = new THREE.ConeGeometry(r * 0.95, r * 1.7, 7, 4);
  displace(rockGeo, r * 0.18, x * 0.01 + z * 0.01);
  const rock = new THREE.Mesh(rockGeo, new THREE.MeshStandardMaterial({ color: 0x77695a, flatShading: true, roughness: 1 }));
  rock.rotation.x = Math.PI; rock.position.y = -r * 0.14 - r * 0.85; g.add(rock);
  const tn = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < tn; i++) {
    const t = makePine(rand(10, 18));
    t.position.set(rand(-r * 0.5, r * 0.5), 0, rand(-r * 0.5, r * 0.5));
    g.add(t);
  }
  if (withPagoda) { const p = makePagoda(3, r * 0.22); p.position.set(r * 0.3, 0, -r * 0.25); g.add(p); }
  g.position.set(x, y, z); scene.add(g);
  islands.push({ g, baseY: y, ph: Math.random() * 7, rs: rand(0.01, 0.05) * (Math.random() < 0.5 ? -1 : 1) });
}
makeIsland(180, 150, 260, 42, false);  makeIsland(-260, 200, 330, 56, true);
makeIsland(430, 240, -60, 38, false);  makeIsland(-430, 270, -180, 50, false);
makeIsland(130, 310, -280, 34, false); makeIsland(-90, 240, 600, 40, false);
makeIsland(540, 180, 430, 48, true);   makeIsland(-540, 220, 470, 36, false);

/* ---------------- 云海 ---------------- */
function cloudSeaLayer(y, tex, rep, op) {
  tex.repeat.set(rep, rep);
  const m = new THREE.Mesh(new THREE.PlaneGeometry(7000, 7000), new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: op, depthWrite: false }));
  m.rotation.x = -Math.PI / 2; m.position.y = y; scene.add(m);
}
cloudSeaLayer(48, seaTex, 9, 0.75);
cloudSeaLayer(72, seaTex2, 6, 0.5);

const clouds = [];
for (let i = 0; i < 46; i++) {
  const m = new THREE.SpriteMaterial({ map: cloudTex, transparent: true, opacity: rand(0.35, 0.7), depthWrite: false, fog: true });
  const s = new THREE.Sprite(m);
  const a = Math.random() * Math.PI * 2, d = rand(250, 2300);
  s.position.set(Math.cos(a) * d, rand(90, 300), Math.sin(a) * d);
  const sc = rand(180, 460); s.scale.set(sc, sc * 0.45, 1);
  scene.add(s); clouds.push({ s, v: rand(2, 7) });
}

/* ---------------- 仙鹤 ---------------- */
const cranes = [];
function makeCrane() {
  const g = new THREE.Group();
  const wm = new THREE.MeshStandardMaterial({ color: 0xf5f2ea, flatShading: true, roughness: 0.9, side: THREE.DoubleSide });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 6), wm); body.scale.set(0.6, 0.45, 1.5); g.add(body);
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.13, 1.1, 5), wm); neck.position.set(0, 0.35, 0.85); neck.rotation.x = 0.7; g.add(neck);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 6, 5), new THREE.MeshStandardMaterial({ color: 0x222222 })); head.position.set(0, 0.72, 1.25); g.add(head);
  const wgeo = new THREE.PlaneGeometry(2.6, 1.1); wgeo.translate(1.3, 0, 0); wgeo.rotateX(-Math.PI / 2);
  const wl = new THREE.Mesh(wgeo, wm); wl.position.set(-0.25, 0.15, 0); wl.scale.x = -1; g.add(wl);
  const wr = new THREE.Mesh(wgeo, wm); wr.position.set(0.25, 0.15, 0); g.add(wr);
  g.userData = { wl, wr };
  return g;
}
const flocks = [
  { c: new THREE.Vector3(-300, 400, -350), r: 280, sp: 0.1, ph: 0 },
  { c: new THREE.Vector3(500, 320, 250), r: 320, sp: -0.085, ph: 2 },
];
for (const f of flocks) for (let i = 0; i < 3; i++) {
  const cr = makeCrane(); cr.scale.setScalar(2.2); scene.add(cr);
  cranes.push({ cr, f, off: i * 0.35 + Math.random() * 0.1, bob: Math.random() * 7 });
}

/* ---------------- 飘落花瓣 ---------------- */
const PETALS = 320;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PETALS * 3);
const pDat = [];
for (let i = 0; i < PETALS; i++) {
  pPos[i*3] = rand(-700, 700); pPos[i*3+1] = rand(60, 600); pPos[i*3+2] = rand(-700, 700);
  pDat.push({ v: rand(6, 14), ph: Math.random() * 7, sw: rand(4, 10) });
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ map: petalTex, size: 5, transparent: true, depthWrite: false, color: 0xffc2d4, opacity: 0.95, sizeAttenuation: true })));

/* ---------------- 飞剑与剑修 ---------------- */
const player = new THREE.Group(); scene.add(player);
const sword = new THREE.Group(); player.add(sword);
const bladeMat = new THREE.MeshStandardMaterial({ color: 0xbfd8e8, metalness: 0.9, roughness: 0.22, emissive: 0x2a6a8a, emissiveIntensity: 0.5, flatShading: true });
{
  const blade = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.07, 3.6), bladeMat); blade.position.z = -0.5; sword.add(blade);
  const tipGeo = new THREE.ConeGeometry(0.35, 0.9, 4); tipGeo.rotateX(-Math.PI / 2);
  const tip = new THREE.Mesh(tipGeo, bladeMat); tip.scale.y = 0.25; tip.position.z = -2.75; sword.add(tip);
  const rune = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.03, 2.4), new THREE.MeshBasicMaterial({ color: 0x8fe8ff }));
  rune.position.set(0, 0.055, -0.5); sword.add(rune);
  const guard = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.9, 6), goldMat); guard.rotation.z = Math.PI / 2; guard.position.z = 1.35; sword.add(guard);
  const grip = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.9, 6), new THREE.MeshStandardMaterial({ color: 0x6b2f2a, roughness: 0.8 }));
  grip.rotation.x = Math.PI / 2; grip.position.z = 1.95; sword.add(grip);
  const pommel = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), goldMat); pommel.position.z = 2.45; sword.add(pommel);
}
const qiMat = new THREE.MeshBasicMaterial({ map: glowTex, color: 0x7fdcff, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
const qi = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 7), qiMat);
qi.rotation.x = -Math.PI / 2; qi.position.set(0, -0.1, 0.6); sword.add(qi);
const swordLight = new THREE.PointLight(0x7fd8ff, 30, 40, 2); swordLight.position.set(0, -0.6, 0); sword.add(swordLight);

// 白衣剑修
const fig = new THREE.Group(); fig.position.set(0, 0.05, 0.4); player.add(fig);
{
  const robeMat = new THREE.MeshStandardMaterial({ color: 0xe9ede6, flatShading: true, roughness: 0.9 });
  const trimMat = new THREE.MeshStandardMaterial({ color: 0x7fb3ae, flatShading: true, roughness: 0.9 });
  const robe = new THREE.Mesh(new THREE.ConeGeometry(0.46, 1.25, 8), robeMat); robe.position.y = 0.62; fig.add(robe);
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.24, 0.6, 7), trimMat); torso.position.y = 1.32; fig.add(torso);
  const sash = new THREE.Mesh(new THREE.TorusGeometry(0.26, 0.055, 6, 12), goldMat); sash.rotation.x = Math.PI / 2; sash.position.y = 1.02; fig.add(sash);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.17, 10, 8), new THREE.MeshStandardMaterial({ color: 0xf2d8c2, roughness: 0.7 })); head.position.y = 1.82; fig.add(head);
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x1c1a1e, roughness: 0.6 });
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.175, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.55), hairMat); hair.position.set(0, 1.85, 0.02); fig.add(hair);
  const bun = new THREE.Mesh(new THREE.SphereGeometry(0.075, 6, 5), hairMat); bun.position.set(0, 2.02, 0.03); fig.add(bun);
  for (const s of [-1, 1]) {
    const sleeve = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.62, 6), robeMat);
    sleeve.position.set(s * 0.26, 1.3, 0.06); sleeve.rotation.z = s * 1.05; sleeve.rotation.x = -0.35; fig.add(sleeve);
  }
}
// 飘带（衣带 + 剑穗）
const ribbons = [];
function makeRibbon(parent, color, w, len, pos, rx, phase) {
  const geo = new THREE.PlaneGeometry(w, len, 1, 12); geo.translate(0, -len / 2, 0);
  const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85, side: THREE.DoubleSide, depthWrite: false }));
  m.position.copy(pos); m.rotation.x = rx; parent.add(m);
  ribbons.push({ m, base: geo.attributes.position.array.slice(), len, ph: phase });
}
makeRibbon(fig, 0x9fe0da, 0.3, 2.8, new THREE.Vector3(-0.14, 1.45, 0.16), -1.35, 0);
makeRibbon(fig, 0xf2e0b0, 0.26, 2.4, new THREE.Vector3(0.16, 1.15, 0.2), -1.2, 2);
makeRibbon(sword, 0xd4504a, 0.14, 1.2, new THREE.Vector3(0, 0, 2.4), -1.1, 4);

// 剑气拖尾
const TRAIL = 64;
const tPos = new Float32Array(TRAIL * 3);
const tGeo = new THREE.BufferGeometry();
tGeo.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
const trail = new THREE.Line(tGeo, new THREE.LineBasicMaterial({ color: 0x9fe8ff, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false }));
trail.frustumCulled = false; scene.add(trail);
function initTrail() { for (let i = 0; i < TRAIL; i++) { tPos[i*3] = S.pos.x; tPos[i*3+1] = S.pos.y; tPos[i*3+2] = S.pos.z; } tGeo.attributes.position.needsUpdate = true; }

/* ---------------- 巡航路线 ---------------- */
const cruisePts = [
  [60, 200, 520], [-320, 250, 430], [-520, 260, 120], [-430, 300, -320],
  [-220, 380, -830], [380, 300, -540], [620, 230, -120], [520, 180, 300], [240, 160, 520]
].map(p => new THREE.Vector3(...p));
const curve = new THREE.CatmullRomCurve3(cruisePts, true, 'centripetal');
const curveLen = curve.getLength();

/* ---------------- 飞行状态与操控 ---------------- */
const S = { pos: new THREE.Vector3(), yaw: 0, pitch: 0, roll: 0, speed: 0, base: 46, mode: 'cruise', cruiseT: 0 };
const MIN_Y = 92, MAX_Y = 860;

const keys = {};
addEventListener('keydown', e => {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();
  if (e.repeat) return;
  keys[e.code] = true;
  if (e.code === 'KeyC') toggleMode();
  if (e.code === 'KeyR') resetFlight();
  if (S.mode === 'cruise' && ['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) setMode('manual');
});
addEventListener('keyup', e => keys[e.code] = false);
addEventListener('wheel', e => { S.base = clamp(S.base - e.deltaY * 0.03, 26, 92); }, { passive: true });

let touch = null;
canvas.addEventListener('pointerdown', e => {
  touch = { x: e.clientX, y: e.clientY, yaw: 0, pitch: 0 };
  canvas.setPointerCapture(e.pointerId);
  if (S.mode === 'cruise') setMode('manual');
});
canvas.addEventListener('pointermove', e => {
  if (!touch) return;
  touch.yaw = clamp((e.clientX - touch.x) / 140, -1, 1);
  touch.pitch = clamp((touch.y - e.clientY) / 140, -1, 1);
});
const endTouch = () => touch = null;
canvas.addEventListener('pointerup', endTouch);
canvas.addEventListener('pointercancel', endTouch);

const btnMode = document.getElementById('btnMode');
function setMode(m) {
  S.mode = m;
  btnMode.textContent = m === 'cruise' ? '切换手动' : '切换巡航';
  if (m === 'cruise') { // 切入巡航：找到路线上最近的点，平滑接轨
    let best = 0, bd = Infinity;
    for (let i = 0; i < 400; i++) {
      const d = curve.getPointAt(i / 400).distanceToSquared(S.pos);
      if (d < bd) { bd = d; best = i / 400; }
    }
    S.cruiseT = best;
  }
}
function toggleMode() { setMode(S.mode === 'cruise' ? 'manual' : 'cruise'); }
btnMode.onclick = toggleMode;

function resetFlight() {
  S.pos.copy(cruisePts[0]);
  const t0 = curve.getTangentAt(0);
  S.yaw = Math.atan2(-t0.x, -t0.z);
  S.pitch = Math.asin(clamp(t0.y, -1, 1));
  S.roll = 0; S.cruiseT = 0;
  initTrail();
}
document.getElementById('btnReset').onclick = resetFlight;

const statMode = document.getElementById('statMode');
const statSpeed = document.getElementById('statSpeed');
const statAlt = document.getElementById('statAlt');
if ('ontouchstart' in window) document.getElementById('hint').textContent = '拖动屏幕操控方向 · 点击按钮切换巡航 / 手动';

/* ---------------- 飞行更新 ---------------- */
const tmpLook = new THREE.Vector3();
function step(dt) {
  let yawIn = 0, pitchIn = 0;
  if (S.mode === 'manual') {
    yawIn = ((keys.KeyA || keys.ArrowLeft) ? 1 : 0) - ((keys.KeyD || keys.ArrowRight) ? 1 : 0);
    pitchIn = ((keys.KeyW || keys.ArrowUp) ? 1 : 0) - ((keys.KeyS || keys.ArrowDown) ? 1 : 0);
    if (touch) { yawIn += touch.yaw; pitchIn += touch.pitch; }
    S.yaw += yawIn * 1.5 * dt;
    S.pitch = clamp(S.pitch + pitchIn * 1.1 * dt, -0.75, 0.75);
  } else {
    // 自动巡航：沿曲线取前瞻点，像 autopilot 一样打方向
    S.cruiseT = (S.cruiseT + S.speed * dt / curveLen) % 1;
    curve.getPointAt((S.cruiseT + (S.speed * 1.7) / curveLen + 0.012) % 1, tmpLook);
    const dir = tmpLook.sub(S.pos), dl = dir.length();
    if (dl > 0.001) {
      dir.divideScalar(dl);
      const dYaw = Math.atan2(-dir.x, -dir.z), dPitch = Math.asin(clamp(dir.y, -1, 1));
      S.yaw += clamp(wrapAngle(dYaw - S.yaw), -1.35 * dt, 1.35 * dt);
      S.pitch += clamp(dPitch - S.pitch, -0.9 * dt, 0.9 * dt);
      yawIn = clamp(wrapAngle(dYaw - S.yaw) * 2.5, -1, 1);
    }
  }
  S.yaw = wrapAngle(S.yaw);

  const boosting = S.mode === 'manual' && keys.Space;
  S.speed = lerp(S.speed, S.base * (boosting ? 1.85 : 1), 1 - Math.exp(-dt * 2.2));

  const cp = Math.cos(S.pitch);
  const fwd = new THREE.Vector3(-Math.sin(S.yaw) * cp, Math.sin(S.pitch), -Math.cos(S.yaw) * cp);
  S.pos.addScaledVector(fwd, S.speed * dt);
  if (S.pos.y < MIN_Y) { S.pos.y = MIN_Y; S.pitch = Math.max(S.pitch, 0.05); }
  if (S.pos.y > MAX_Y) { S.pos.y = MAX_Y; S.pitch = Math.min(S.pitch, -0.05); }

  S.roll = lerp(S.roll, yawIn * (S.mode === 'manual' ? 0.55 : 0.7), 1 - Math.exp(-dt * 5));
  player.position.copy(S.pos);
  player.quaternion.setFromEuler(new THREE.Euler(S.pitch, S.yaw, S.roll, 'YXZ'));
  player.updateMatrixWorld();

  // 相机跟随
  const dist = S.mode === 'cruise' ? 17 : 13;
  const desired = S.pos.clone().addScaledVector(fwd, -dist);
  desired.y += S.mode === 'cruise' ? 6 : 4.6;
  camera.position.lerp(desired, 1 - Math.exp(-dt * 3.2));
  camera.lookAt(S.pos.x + fwd.x * 10, S.pos.y + 1.6 + fwd.y * 10, S.pos.z + fwd.z * 10);
  camera.rotateZ(S.roll * 0.28);

  const fovT = boosting ? 74 : 62;
  if (Math.abs(camera.fov - fovT) > 0.05) {
    camera.fov = lerp(camera.fov, fovT, 1 - Math.exp(-dt * 4));
    camera.updateProjectionMatrix();
  }

  // 剑气随速度明暗
  const b = boosting ? 1 : 0;
  qi.scale.set(1 + b * 0.5, 1 + b * 0.9, 1);
  qiMat.opacity = 0.4 + b * 0.3;
  swordLight.intensity = 30 + b * 25;

  // 拖尾
  tPos.copyWithin(0, 3);
  const tipW = player.localToWorld(new THREE.Vector3(0, 0.05, -3.1));
  tPos[(TRAIL-1)*3] = tipW.x; tPos[(TRAIL-1)*3+1] = tipW.y; tPos[(TRAIL-1)*3+2] = tipW.z;
  tGeo.attributes.position.needsUpdate = true;
}

/* ---------------- 主循环 ---------------- */
const clock = new THREE.Clock();
let firstFrame = true;
resetFlight();
setMode('cruise');

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  step(dt);

  for (const it of islands) {
    it.g.position.y = it.baseY + Math.sin(t * 0.5 + it.ph) * 5;
    it.g.rotation.y += it.rs * dt;
  }
  for (const c of cranes) {
    const a = c.f.ph + c.off + t * c.f.sp;
    c.cr.position.set(c.f.c.x + Math.cos(a) * c.f.r, c.f.c.y + Math.sin(t * 0.8 + c.bob) * 12, c.f.c.z + Math.sin(a) * c.f.r);
    const sg = Math.sign(c.f.sp);
    c.cr.rotation.y = Math.atan2(-Math.sin(a) * sg, Math.cos(a) * sg);
    const flap = 0.15 + Math.sin(t * 6 + c.bob) * 0.5;
    c.cr.userData.wl.rotation.z = -flap; c.cr.userData.wr.rotation.z = flap;
  }
  const pp = pGeo.attributes.position.array;
  for (let i = 0; i < PETALS; i++) {
    pp[i*3+1] -= pDat[i].v * dt;
    pp[i*3] += Math.sin(t * 1.5 + pDat[i].ph) * pDat[i].sw * dt;
    pp[i*3+2] += Math.cos(t * 1.2 + pDat[i].ph) * pDat[i].sw * 0.6 * dt;
    if (pp[i*3+1] < 50) { pp[i*3+1] = 600; pp[i*3] = S.pos.x + rand(-500, 500); pp[i*3+2] = S.pos.z + rand(-500, 500); }
  }
  pGeo.attributes.position.needsUpdate = true;

  seaTex.offset.x += dt * 0.004; seaTex.offset.y += dt * 0.0015;
  seaTex2.offset.x -= dt * 0.0025; seaTex2.offset.y += dt * 0.003;
  for (const c of clouds) { c.s.position.x += c.v * dt; if (c.s.position.x > 2500) c.s.position.x = -2500; }

  for (const r of ribbons) {
    const p = r.m.geometry.attributes.position, arr = p.array, b = r.base;
    for (let i = 0; i < p.count; i++) {
      const t01 = -b[i*3+1] / r.len;
      arr[i*3] = b[i*3] + Math.sin(t * 4 + r.ph + t01 * 5) * 0.14 * t01;
      arr[i*3+2] = b[i*3+2] + Math.cos(t * 3.2 + r.ph + t01 * 4) * 0.12 * t01;
    }
    p.needsUpdate = true;
  }

  renderer.render(scene, camera);
  if (firstFrame) { firstFrame = false; document.getElementById('loading').classList.add('hide'); }

  statMode.textContent = S.mode === 'cruise' ? '自动巡航' : '手动御剑';
  statSpeed.textContent = Math.round(S.speed * 3.6) + ' 里';
  statAlt.textContent = Math.round(S.pos.y) + ' 丈';
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
